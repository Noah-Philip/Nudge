<!doctype html>
<html><head><meta charset="utf-8"/><title>Nudge Feed</title></head>
<body style="margin:0;font-family:Arial;background:#111;color:#fff;">
<div style="position:fixed;top:10px;left:10px;z-index:2"><a href="/upload" style="color:#fff">Upload</a> · <a href="/library" style="color:#fff">Library</a></div>
<main id="app" style="height:100vh;display:flex;align-items:center;justify-content:center;"></main>
<script>
const app = document.getElementById('app');
let videos=[]; let idx=0; let viewed = new Set();
const chessPuzzles=[
  {prompt:'White to move: best continuation?',options:['Qh7+','Nf7+','Bxf7+','Qg8+'],answer:1},
  {prompt:'Black to move: win material?',options:['Nxe4','Qh4','Bxh2+','Qxd2'],answer:2}
];
const workouts=[
  {seconds:40,steps:['10 squats','20s plank','5 pushups']},
  {seconds:30,steps:['15 jumping jacks','10 lunges each side']}
];
const esc=(s)=>String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
async function load(){ const r=await fetch('/api/videos'); const j=await r.json(); videos=j.videos||[]; render(); }
function getItems(){
  const out=[];
  for(let i=0;i<videos.length;i++){
    out.push({type:'video',video:videos[i]});
    if((i+1)%3===0){ out.push({type:'module',moduleType:((i/3)%2===0?'CHESS':'WORKOUT'),topic:videos[i].topic}); }
  }
  return out;
}
async function trackView(v){ if(viewed.has(v.id))return; viewed.add(v.id); await fetch('/api/videos/view',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({videoId:v.id})}); v.views++; }
async function like(v){ const r=await fetch('/api/videos/like',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({videoId:v.id})}); const j=await r.json(); if(r.ok){v.likes=j.likes; render();}}
function nav(step){ const items=getItems(); if(!items.length) return; idx=(idx+step+items.length)%items.length; render(); }
async function trackModule(moduleType, topic, completed){ await fetch('/api/modules/attempt',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({moduleType,topic,completed})}); }
function renderChess(topic){ const p = chessPuzzles[Math.floor(Math.random()*chessPuzzles.length)]; trackModule('CHESS',topic,false);
app.innerHTML=`<section style="width:min(420px,95vw);padding:20px;background:#1f2937;border-radius:16px"><h2>♟️ Chess Nudge</h2><p>${p.prompt}</p>${p.options.map((o,i)=>`<button data-i="${i}" style="display:block;width:100%;margin:6px 0">${o}</button>`).join('')}<p id="result"></p><div><button id="prev">Prev</button><button id="next">Next</button></div></section>`;
[...document.querySelectorAll('button[data-i]')].forEach(b=>b.onclick=async()=>{const ok=Number(b.dataset.i)===p.answer;document.getElementById('result').textContent=ok?'Correct!':'Not quite.';await trackModule('CHESS',topic,true);});
document.getElementById('next').onclick=()=>nav(1);document.getElementById('prev').onclick=()=>nav(-1);
}
function renderWorkout(topic){ const w=workouts[Math.floor(Math.random()*workouts.length)]; let t=w.seconds; trackModule('WORKOUT',topic,false);
app.innerHTML=`<section style="width:min(420px,95vw);padding:20px;background:#1f2937;border-radius:16px"><h2>💪 Workout Nudge</h2><p>Timer: <span id='timer'>${t}</span>s</p>${w.steps.map((s,i)=>`<label style='display:block'><input type='checkbox' id='c${i}'/> ${s}</label>`).join('')}<button id='complete'>Complete</button><p id='msg'></p><div><button id="prev">Prev</button><button id="next">Next</button></div></section>`;
const int=setInterval(()=>{t--; const el=document.getElementById('timer'); if(el)el.textContent=t; if(t<=0)clearInterval(int);},1000);
document.getElementById('complete').onclick=async()=>{document.getElementById('msg').textContent='Great job!'; await trackModule('WORKOUT',topic,true);};
document.getElementById('next').onclick=()=>{clearInterval(int);nav(1)};document.getElementById('prev').onclick=()=>{clearInterval(int);nav(-1)};
}
function render(){
  const items=getItems();
  if(!items.length){ app.innerHTML='<div><h2>No videos yet</h2><a style="color:#fff" href="/upload">Upload your first MP4</a></div>'; return; }
  const item=items[idx];
  if(item.type==='module'){ if(item.moduleType==='CHESS') return renderChess(item.topic); return renderWorkout(item.topic); }
  const v=item.video; trackView(v);
  app.innerHTML=`<section style="width:min(420px,95vw)"><video src="${v.filePath}" controls autoplay loop playsinline style="width:100%;height:70vh;object-fit:cover;border-radius:16px;background:#000"></video><h2>${esc(v.title)}</h2><p>Topic: ${esc(v.topic)}</p><p>Views: ${v.views} · Likes: ${v.likes}</p><div style="display:flex;gap:8px"><button id="prev">Prev</button><button id="next">Next</button><button id="like">Like</button></div></section>`;
  document.getElementById('next').onclick=()=>nav(1); document.getElementById('prev').onclick=()=>nav(-1); document.getElementById('like').onclick=()=>like(v);
}
window.addEventListener('wheel',(e)=>{ if(Math.abs(e.deltaY)>15) nav(e.deltaY>0?1:-1); }, {passive:true});
window.addEventListener('keydown',(e)=>{ if(e.key==='ArrowDown')nav(1); if(e.key==='ArrowUp')nav(-1);});
load();
</script></body></html>
