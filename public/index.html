<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nudge Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes nudgePulse {
      0%, 100% { opacity: 0.65; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-1px); }
    }

    .nudge-pulse {
      animation: nudgePulse 1.8s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-md min-h-screen p-4">
    <header class="flex items-center justify-between py-2">
      <h1 class="text-xl font-bold">Nudge Feed</h1>
      <div class="flex items-center gap-3">
        <button id="snoozeBtn" class="rounded-lg border border-violet-300/40 bg-violet-400/10 px-3 py-1 text-xs font-semibold text-violet-200">Snooze nudges (10)</button>
        <nav class="text-sm space-x-3">
          <a class="text-violet-300" href="/">Landing</a>
          <a class="text-violet-300" href="/upload">Upload</a>
          <a class="text-violet-300" href="/library">Library</a>
        </nav>
      </div>
    </header>

    <section id="card" class="mt-3 rounded-xl border border-white/10 bg-slate-900 p-3"></section>

    <div class="mt-4 flex items-center justify-between gap-3">
      <button id="prevBtn" class="flex-1 rounded-lg bg-slate-800 px-4 py-2">Prev</button>
      <button id="likeBtn" class="flex-1 rounded-lg bg-rose-500 px-4 py-2 font-semibold">Like ❤️</button>
      <button id="nextBtn" class="flex-1 rounded-lg bg-slate-800 px-4 py-2">Next</button>
    </div>

    <p id="meta" class="mt-3 text-xs text-slate-400"></p>
    <p id="snoozeMeta" class="mt-2 text-xs text-violet-300"></p>
    <p id="status" class="mt-2 text-sm text-amber-300"></p>
  </main>

  <script>
    const card = document.getElementById('card');
    const meta = document.getElementById('meta');
    const status = document.getElementById('status');
    const snoozeMeta = document.getElementById('snoozeMeta');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const likeBtn = document.getElementById('likeBtn');
    const snoozeBtn = document.getElementById('snoozeBtn');

    const state = {
      videos: [],
      cursor: 0,
      moduleTicker: 0,
      showingModule: false,
      recordedViews: new Set(),
      playbackError: false,
      workoutTimer: null,
      typingTimer: null,
      isMuted: false,
      snoozeRemaining: 0,
      moduleShownKey: '',
      typingNudge: {
        started: false,
        finished: false,
        timeLeft: 30,
        score: 0,
        typedWords: 0,
        misses: 0,
        activeWords: [],
        inputValue: '',
        elapsedTicks: 0,
        spawnCarry: 0,
      },
      resetNudge: {
        selectedType: '',
        active: false,
        started: false,
        completed: false,
        stepIndex: 0,
        phaseIndex: 0,
        phaseElapsed: 0,
        secondsLeft: 0,
      },
    };

    const MODULE_EVERY = 3;
    const MODULE_SEQUENCE = ['chess', 'workout', 'typing'];
    const TYPING_WORDS = [
      'focus', 'build', 'launch', 'clarity', 'momentum', 'routine', 'learn', 'habit', 'create', 'ship',
      'flow', 'signal', 'deep', 'energy', 'practice', 'rapid', 'steady', 'intent', 'output', 'iterate',
    ];
    const RESET_REASONS = [
      'Because you’ve been scrolling for a while.',
      'Because you watched fitness content.',
    ];
    const RESET_CONFIG = {
      stretch: {
        label: 'Stretch',
        title: '30s Reset',
        steps: [
          { label: 'Shoulder rolls', seconds: 10 },
          { label: 'Neck stretch', seconds: 10 },
          { label: 'Stand + reach', seconds: 10 },
        ],
      },
      strength: {
        label: 'Strength',
        title: '40s Reset',
        steps: [
          { label: '10 squats', seconds: 20 },
          { label: 'Hold squat', seconds: 10 },
          { label: 'Calf raises', seconds: 10 },
        ],
      },
      breath: {
        label: 'Breath',
        title: '24s Reset',
        phases: [
          { label: 'Inhale', seconds: 4 },
          { label: 'Hold', seconds: 2 },
          { label: 'Exhale', seconds: 6 },
        ],
        cycles: 2,
      },
    };

    const moduleTypeForIndex = (index) => MODULE_SEQUENCE[index % MODULE_SEQUENCE.length];

    function updateSnoozeUI() {
      if (state.snoozeRemaining > 0) {
        snoozeMeta.textContent = `Nudges snoozed (${state.snoozeRemaining} videos left)`;
        snoozeBtn.textContent = `Snoozed (${state.snoozeRemaining})`;
        snoozeBtn.className = 'rounded-lg border border-emerald-300/50 bg-emerald-400/10 px-3 py-1 text-xs font-semibold text-emerald-200';
      } else {
        snoozeMeta.textContent = '';
        snoozeBtn.textContent = 'Snooze nudges (10)';
        snoozeBtn.className = 'rounded-lg border border-violet-300/40 bg-violet-400/10 px-3 py-1 text-xs font-semibold text-violet-200';
      }
    }

    function setCardMode(isModule) {
      card.className = isModule
        ? 'mt-3 rounded-xl border border-violet-300/30 bg-violet-900/20 p-3'
        : 'mt-3 rounded-xl border border-white/10 bg-slate-900 p-3';
    }

    async function loadVideos() {
      status.textContent = 'Loading videos...';
      const response = await fetch('/api/videos');
      const data = await response.json();
      state.videos = data.videos || [];
      if (!state.videos.length) {
        status.textContent = 'No videos yet. Add one at /upload.';
      } else {
        status.textContent = '';
      }
      render();
    }

    function currentVideo() {
      return state.videos[state.cursor];
    }

    async function postJson(url, body) {
      try {
        await fetch(url, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
        });
      } catch (_) {
        // fire-and-forget for MVP
      }
    }

    function clearWorkoutTimer() {
      if (!state.workoutTimer) return;
      clearInterval(state.workoutTimer);
      state.workoutTimer = null;
    }

    function clearTypingTimer() {
      if (!state.typingTimer) return;
      clearInterval(state.typingTimer);
      state.typingTimer = null;
    }

    function resetTypingNudgeState() {
      clearTypingTimer();
      state.typingNudge = {
        started: false,
        finished: false,
        timeLeft: 30,
        score: 0,
        typedWords: 0,
        misses: 0,
        activeWords: [],
        inputValue: '',
        elapsedTicks: 0,
        spawnCarry: 0,
      };
    }

    function resetResetNudgeState() {
      clearWorkoutTimer();
      state.resetNudge = {
        selectedType: '',
        active: false,
        started: false,
        completed: false,
        stepIndex: 0,
        phaseIndex: 0,
        phaseElapsed: 0,
        secondsLeft: 0,
      };
    }

    function postModuleEvent(eventType, details = {}) {
      const topic = details.resetType || 'fitness';
      postJson('/api/modules/attempt', {
        moduleType: 'RESET_NUDGE',
        topic,
        completed: eventType === 'completed',
      });
    }

    function typingReasonText() {
      const video = currentVideo();
      return video && ['typing', 'productivity', 'study'].includes((video.topic || '').toLowerCase())
        ? 'Because you’ve been watching typing/productivity content.'
        : 'Because you’ve been scrolling for a while.';
    }

    function trackTypingEvent(eventType, details = {}) {
      const accuracy = details.accuracy ?? 0;
      const score = details.score ?? 0;
      const misses = details.misses ?? 0;
      const topic = `typing-sprint|${eventType}|score:${score}|accuracy:${accuracy}|misses:${misses}`;
      postJson('/api/modules/attempt', {
        moduleType: 'TYPING_SPRINT',
        topic,
        completed: eventType === 'completed',
      });
    }

    async function recordViewOnce(video) {
      if (!video || state.recordedViews.has(video.id)) return;
      state.recordedViews.add(video.id);
      await postJson('/api/videos/view', { videoId: video.id });
    }

    async function likeCurrent() {
      const video = currentVideo();
      if (!video || state.showingModule) return;
      const response = await fetch('/api/videos/like', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ videoId: video.id }),
      });
      if (response.ok) {
        const data = await response.json();
        video.likes = data.likes;
        renderMeta();
      }
    }

    function renderMeta() {
      if (!state.videos.length) {
        meta.textContent = '0 videos loaded';
        return;
      }
      if (state.showingModule) {
        meta.textContent = `Interactive module • inserted after every ${MODULE_EVERY} videos`;
        return;
      }
      const video = currentVideo();
      meta.textContent = `${state.cursor + 1}/${state.videos.length} • ${video.title} • topic: ${video.topic} • ${video.views || 0} views • ${video.likes || 0} likes`;
    }

    function showVideo(video) {
      setCardMode(false);
      state.playbackError = false;
      card.innerHTML = `
        <h2 class="mb-2 text-lg font-semibold">${video.title}</h2>
        <video id="feedVideo" class="w-full rounded-lg bg-black" src="${video.filePath}" autoplay playsinline loop controls preload="metadata"></video>
        <p class="mt-2 text-sm text-slate-300">Topic: ${video.topic}</p>
      `;

      const element = document.getElementById('feedVideo');
      element.defaultMuted = false;
      element.muted = state.isMuted;
      element.volume = 1;
      element.addEventListener('volumechange', () => {
        state.isMuted = element.muted;
      });
      element.addEventListener('loadeddata', () => { state.playbackError = false; status.textContent = ''; });
      element.addEventListener('error', () => {
        state.playbackError = true;
        status.textContent = 'Video failed to play. Ensure file uses a browser-supported MP4 codec (H.264 + AAC).';
        card.innerHTML += '<p class="mt-2 text-sm text-amber-300">Playback error for this file.</p>';
      });

      recordViewOnce(video);
    }

    function renderChessModule() {
      setCardMode(true);
      card.innerHTML = `
        <div class="mb-2 flex items-center justify-between">
          <span class="rounded-full border border-violet-200/50 bg-violet-300/15 px-2 py-0.5 text-xs font-semibold uppercase tracking-wide text-violet-100">Nudge</span>
          <span class="nudge-pulse text-xs font-medium text-violet-200">Pause scroll - try this</span>
        </div>
        <h2 class="text-lg font-semibold">Chess Puzzle</h2>
        <p class="mt-2 text-sm text-slate-300">White to move. Which tactic wins material?</p>
        <div class="mt-3 grid gap-2">
          <button data-answer="fork" class="chess-answer rounded-lg bg-slate-800 px-3 py-2 text-left">A) Knight fork on c7+</button>
          <button data-answer="pin" class="chess-answer rounded-lg bg-slate-800 px-3 py-2 text-left">B) Pin the knight with Bb5</button>
          <button data-answer="sac" class="chess-answer rounded-lg bg-slate-800 px-3 py-2 text-left">C) Sacrifice queen on h7</button>
        </div>
        <p id="moduleFeedback" class="mt-3 text-sm text-violet-300"></p>
        <div class="mt-5 rounded-lg border border-white/10 bg-slate-950/60 p-3">
          <p class="text-sm text-slate-200">Bonus board puzzle: White to move, find the fork.</p>
          <p class="mt-1 text-xs text-slate-400">Click the piece, then click the destination square.</p>
          <div id="chessBoard" class="mx-auto mt-3 grid w-full max-w-[360px] grid-cols-8 overflow-hidden rounded border border-white/10"></div>
          <p id="boardPuzzleStatus" class="mt-2 text-sm text-violet-300">Your move?</p>
        </div>
      `;

      postJson('/api/modules/attempt', { moduleType: 'CHESS_PUZZLE', topic: 'chess', completed: false });

      card.querySelectorAll('.chess-answer').forEach((button) => {
        button.addEventListener('click', () => {
          const feedback = document.getElementById('moduleFeedback');
          const isCorrect = button.getAttribute('data-answer') === 'fork';
          feedback.textContent = isCorrect ? 'Correct. Nice pattern recognition.' : 'Not quite. Fork was strongest.';
          if (isCorrect) {
            postJson('/api/modules/attempt', { moduleType: 'CHESS_PUZZLE', topic: 'chess', completed: true });
          }
        });
      });

      setupChessBoardPuzzle();
    }

    function setupChessBoardPuzzle() {
      const boardEl = document.getElementById('chessBoard');
      const puzzleStatus = document.getElementById('boardPuzzleStatus');
      const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
      const board = {
        e8: 'bk',
        h8: 'br',
        d8: 'bq',
        e7: 'bp',
        g7: 'bp',
        b7: 'bp',
        c6: 'bn',
        e6: 'bb',
        g5: 'wn',
        c4: 'wb',
        d1: 'wq',
        g1: 'wk',
      };
      const pieceImages = {
        wk: 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
        wq: 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
        wb: 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
        wn: 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
        wp: 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
        bk: 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        bq: 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
        bb: 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
        bn: 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
        bp: 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
        br: 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
      };

      const solution = { from: 'g5', to: 'f7' };
      let selectedSquare = '';
      let solved = false;

      function isWhitePiece(piece) {
        return piece.startsWith('w');
      }

      function movePiece(from, to) {
        board[to] = board[from];
        delete board[from];
      }

      function renderBoard() {
        boardEl.innerHTML = '';
        for (let rank = 8; rank >= 1; rank -= 1) {
          for (let fileIndex = 0; fileIndex < files.length; fileIndex += 1) {
            const square = `${files[fileIndex]}${rank}`;
            const isLight = (rank + fileIndex) % 2 === 0;
            const piece = board[square] || '';
            const isSelected = square === selectedSquare;
            const squareEl = document.createElement('button');
            squareEl.type = 'button';
            squareEl.setAttribute('data-square', square);
            squareEl.className = `aspect-square p-0 transition ${isLight ? 'bg-amber-100' : 'bg-amber-700'} ${isSelected ? 'ring-2 ring-sky-400 ring-inset' : ''}`;
            if (piece) {
              const pieceEl = document.createElement('img');
              pieceEl.src = pieceImages[piece];
              pieceEl.alt = piece;
              pieceEl.className = 'pointer-events-none h-full w-full select-none object-contain scale-110';
              squareEl.appendChild(pieceEl);
            }
            squareEl.addEventListener('click', () => onSquareClick(square));
            boardEl.appendChild(squareEl);
          }
        }
      }

      function onSquareClick(square) {
        if (solved) return;
        const piece = board[square];
        if (!selectedSquare) {
          if (piece && isWhitePiece(piece)) {
            selectedSquare = square;
            puzzleStatus.textContent = `Selected ${square}. Now choose destination.`;
            renderBoard();
          } else {
            puzzleStatus.textContent = 'Select a white piece first.';
          }
          return;
        }

        if (square === selectedSquare) {
          selectedSquare = '';
          puzzleStatus.textContent = 'Selection cleared. Your move?';
          renderBoard();
          return;
        }

        const move = { from: selectedSquare, to: square };
        const isCorrect = move.from === solution.from && move.to === solution.to;
        if (isCorrect) {
          movePiece(move.from, move.to);
          solved = true;
          selectedSquare = '';
          puzzleStatus.textContent = 'Nice! Nf7+ forks king and rook.';
          postJson('/api/modules/attempt', { moduleType: 'CHESS_PUZZLE', topic: 'chess', completed: true });
        } else {
          selectedSquare = '';
          puzzleStatus.textContent = 'Not that move. Hint: jump with the knight for a fork.';
        }

        renderBoard();
      }

      renderBoard();
    }

    function workoutReasonText() {
      const video = currentVideo();
      return video && video.topic === 'fitness' ? RESET_REASONS[1] : RESET_REASONS[0];
    }

    function formatSeconds(totalSeconds) {
      const mm = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const ss = String(totalSeconds % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    }

    function stepCountForType(resetType) {
      if (resetType === 'breath') return RESET_CONFIG.breath.cycles * RESET_CONFIG.breath.phases.length;
      return RESET_CONFIG[resetType].steps.length;
    }

    function totalSecondsForType(resetType) {
      if (resetType === 'breath') {
        const cycleSeconds = RESET_CONFIG.breath.phases.reduce((total, phase) => total + phase.seconds, 0);
        return cycleSeconds * RESET_CONFIG.breath.cycles;
      }
      return RESET_CONFIG[resetType].steps.reduce((total, step) => total + step.seconds, 0);
    }

    function getCurrentInstruction(resetType) {
      if (!resetType) return { label: 'Pick your reset type', seconds: 0, stepNumber: 0, stepCount: 1 };
      if (resetType === 'breath') {
        const phase = RESET_CONFIG.breath.phases[state.resetNudge.phaseIndex];
        return {
          label: `${phase.label} — cycle ${state.resetNudge.stepIndex + 1}`,
          seconds: phase.seconds,
          stepNumber: state.resetNudge.stepIndex * RESET_CONFIG.breath.phases.length + state.resetNudge.phaseIndex + 1,
          stepCount: stepCountForType('breath'),
        };
      }
      const step = RESET_CONFIG[resetType].steps[state.resetNudge.stepIndex];
      return {
        label: step.label,
        seconds: step.seconds,
        stepNumber: state.resetNudge.stepIndex + 1,
        stepCount: stepCountForType(resetType),
      };
    }

    function overallProgressPercent() {
      const resetType = state.resetNudge.selectedType;
      if (!resetType) return 0;
      const total = totalSecondsForType(resetType);
      const elapsed = total - state.resetNudge.secondsLeft;
      return Math.max(0, Math.min(100, Math.round((elapsed / total) * 100)));
    }

    function renderWorkoutModule() {
      if (!state.moduleShownKey) {
        resetResetNudgeState();
      }
      setCardMode(true);
      const resetType = state.resetNudge.selectedType;
      const instruction = getCurrentInstruction(resetType);
      const progress = overallProgressPercent();
      const done = state.resetNudge.completed;
      card.innerHTML = `
        <div class="mb-2 flex items-center justify-between">
          <span class="rounded-full border border-violet-200/50 bg-violet-300/15 px-2 py-0.5 text-xs font-semibold uppercase tracking-wide text-violet-100">Nudge</span>
          <span class="nudge-pulse text-xs font-medium text-violet-200">Pause scroll — try this</span>
        </div>
        <h2 class="text-lg font-semibold">${resetType ? RESET_CONFIG[resetType].title : '30s Reset'}</h2>
        <p class="mt-1 text-xs text-violet-200/90">Why this appeared: ${workoutReasonText()}</p>

        <div class="mt-3 h-2 w-full overflow-hidden rounded-full bg-slate-800/80">
          <div class="h-full rounded-full bg-emerald-400 transition-all" style="width: ${progress}%"></div>
        </div>
        <p class="mt-2 text-xs text-slate-300">${done ? 'Complete' : `Step ${instruction.stepNumber || 1} of ${instruction.stepCount || 1}`}</p>

        <div class="mt-3 rounded-xl border border-violet-200/20 bg-violet-950/30 p-4 text-center">
          <p class="text-sm text-violet-100">${done ? '✅ Nice reset.' : instruction.label}</p>
          <p class="mt-2 text-4xl font-bold text-white">${done ? 'Done' : formatSeconds(state.resetNudge.secondsLeft || instruction.seconds || 0)}</p>
          <p class="mt-1 text-xs text-slate-300">${done ? 'You completed a movement break.' : 'Follow the timer and keep it easy.'}</p>
        </div>

        ${!state.resetNudge.active && !done ? `
          <div class="mt-3 grid grid-cols-3 gap-2">
            <button data-reset-type="stretch" class="reset-type-btn rounded-lg border border-white/15 bg-slate-800 px-2 py-2 text-sm ${resetType === 'stretch' ? 'ring-2 ring-emerald-400' : ''}">Stretch</button>
            <button data-reset-type="strength" class="reset-type-btn rounded-lg border border-white/15 bg-slate-800 px-2 py-2 text-sm ${resetType === 'strength' ? 'ring-2 ring-emerald-400' : ''}">Strength</button>
            <button data-reset-type="breath" class="reset-type-btn rounded-lg border border-white/15 bg-slate-800 px-2 py-2 text-sm ${resetType === 'breath' ? 'ring-2 ring-emerald-400' : ''}">Breath</button>
          </div>
        ` : ''}

        <div class="mt-4 flex flex-wrap gap-2">
          ${!state.resetNudge.started && !done ? '<button id="startResetBtn" class="rounded bg-emerald-500 px-4 py-2 text-sm font-semibold">Start</button>' : ''}
          ${state.resetNudge.active && !done ? '<button id="nextStepBtn" class="rounded bg-sky-500 px-4 py-2 text-sm font-semibold">Next step</button>' : ''}
          ${done ? '<button id="continueFeedBtn" class="rounded bg-emerald-500 px-4 py-2 text-sm font-semibold">Continue feed</button>' : ''}
          <button id="skipModuleBtn" class="rounded bg-slate-700 px-4 py-2 text-sm">Skip</button>
          <button id="snoozeModuleBtn" class="rounded border border-violet-300/40 bg-violet-400/10 px-4 py-2 text-sm text-violet-200">Snooze nudges</button>
        </div>
      `;

      if (!state.moduleShownKey) {
        state.moduleShownKey = `workout-${state.moduleTicker}`;
        postModuleEvent('shown');
      }

      card.querySelectorAll('.reset-type-btn').forEach((button) => {
        button.addEventListener('click', () => {
          state.resetNudge.selectedType = button.getAttribute('data-reset-type');
          const total = totalSecondsForType(state.resetNudge.selectedType);
          state.resetNudge.secondsLeft = total;
          state.resetNudge.stepIndex = 0;
          state.resetNudge.phaseIndex = 0;
          state.resetNudge.phaseElapsed = 0;
          postModuleEvent('type_selected', { resetType: state.resetNudge.selectedType });
          renderWorkoutModule();
        });
      });

      const startResetBtn = document.getElementById('startResetBtn');
      if (startResetBtn) startResetBtn.addEventListener('click', startResetFlow);

      const nextStepBtn = document.getElementById('nextStepBtn');
      if (nextStepBtn) nextStepBtn.addEventListener('click', moveToNextResetStep);

      const skipModuleBtn = document.getElementById('skipModuleBtn');
      if (skipModuleBtn) {
        skipModuleBtn.addEventListener('click', () => {
          clearWorkoutTimer();
          postModuleEvent('skipped', { resetType: state.resetNudge.selectedType });
          state.showingModule = false;
          state.moduleShownKey = '';
          render();
        });
      }

      const snoozeModuleBtn = document.getElementById('snoozeModuleBtn');
      if (snoozeModuleBtn) {
        snoozeModuleBtn.addEventListener('click', () => {
          state.snoozeRemaining = 10;
          clearWorkoutTimer();
          state.showingModule = false;
          state.moduleShownKey = '';
          updateSnoozeUI();
          render();
        });
      }

      const continueFeedBtn = document.getElementById('continueFeedBtn');
      if (continueFeedBtn) {
        continueFeedBtn.addEventListener('click', () => {
          clearWorkoutTimer();
          state.showingModule = false;
          state.moduleShownKey = '';
          render();
        });
      }
    }

    function startResetFlow() {
      if (!state.resetNudge.selectedType) return;
      if (state.resetNudge.started) return;
      state.resetNudge.started = true;
      state.resetNudge.active = true;
      state.resetNudge.completed = false;
      postModuleEvent('started', { resetType: state.resetNudge.selectedType });
      clearWorkoutTimer();
      state.workoutTimer = setInterval(tickResetNudge, 1000);
      renderWorkoutModule();
    }

    function moveToNextResetStep() {
      if (!state.resetNudge.active) return;
      if (state.resetNudge.selectedType === 'breath') {
        advanceBreathStep();
      } else {
        advanceLinearStep();
      }
      renderWorkoutModule();
    }

    function advanceLinearStep() {
      const resetType = state.resetNudge.selectedType;
      const steps = RESET_CONFIG[resetType].steps;
      if (state.resetNudge.stepIndex >= steps.length - 1) {
        finishResetNudge();
        return;
      }
      state.resetNudge.stepIndex += 1;
    }

    function advanceBreathStep() {
      const nextPhase = state.resetNudge.phaseIndex + 1;
      if (nextPhase < RESET_CONFIG.breath.phases.length) {
        state.resetNudge.phaseIndex = nextPhase;
        return;
      }
      state.resetNudge.phaseIndex = 0;
      if (state.resetNudge.stepIndex < RESET_CONFIG.breath.cycles - 1) {
        state.resetNudge.stepIndex += 1;
      } else {
        finishResetNudge();
      }
    }

    function tickResetNudge() {
      if (!state.resetNudge.active || state.resetNudge.completed) return;
      state.resetNudge.secondsLeft = Math.max(0, state.resetNudge.secondsLeft - 1);
      state.resetNudge.phaseElapsed += 1;
      const instruction = getCurrentInstruction(state.resetNudge.selectedType);
      if (state.resetNudge.phaseElapsed >= instruction.seconds) {
        state.resetNudge.phaseElapsed = 0;
        moveToNextResetStep();
        return;
      }
      renderWorkoutModule();
    }

    function finishResetNudge() {
      clearWorkoutTimer();
      state.resetNudge.completed = true;
      state.resetNudge.active = false;
      state.resetNudge.phaseElapsed = 0;
      state.resetNudge.secondsLeft = 0;
      postModuleEvent('completed', { resetType: state.resetNudge.selectedType });
    }

    function typingAccuracy() {
      const total = state.typingNudge.typedWords + state.typingNudge.misses;
      if (!total) return 100;
      return Math.round((state.typingNudge.typedWords / total) * 100);
    }

    function typingProgressPercent() {
      return Math.round(((30 - state.typingNudge.timeLeft) / 30) * 100);
    }

    function randomTypingWord() {
      const offset = (state.typingNudge.elapsedTicks + state.typingNudge.typedWords + state.typingNudge.misses) % TYPING_WORDS.length;
      return TYPING_WORDS[offset];
    }

    function spawnTypingWord() {
      if (state.typingNudge.activeWords.length >= 6) return;
      const lane = state.typingNudge.elapsedTicks % 4;
      state.typingNudge.activeWords.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        text: randomTypingWord(),
        y: -8,
        x: 8 + lane * 22,
        speed: 0.45 + (30 - state.typingNudge.timeLeft) * 0.03,
      });
    }

    function finishTypingRound() {
      clearTypingTimer();
      state.typingNudge.started = false;
      state.typingNudge.finished = true;
      trackTypingEvent('completed', {
        score: state.typingNudge.score,
        accuracy: typingAccuracy(),
        misses: state.typingNudge.misses,
      });
      renderTypingModule();
    }

    function tickTypingGame() {
      if (!state.typingNudge.started || state.typingNudge.finished) return;
      state.typingNudge.elapsedTicks += 1;
      if (state.typingNudge.elapsedTicks % 8 === 0) {
        state.typingNudge.timeLeft = Math.max(0, state.typingNudge.timeLeft - 1);
      }

      const spawnRate = Math.max(0.2, 0.62 - ((30 - state.typingNudge.timeLeft) * 0.012));
      state.typingNudge.spawnCarry += spawnRate;
      while (state.typingNudge.spawnCarry >= 1) {
        spawnTypingWord();
        state.typingNudge.spawnCarry -= 1;
      }

      state.typingNudge.activeWords = state.typingNudge.activeWords.filter((word) => {
        const nextY = word.y + word.speed;
        if (nextY >= 88) {
          state.typingNudge.misses += 1;
          return false;
        }
        word.y = nextY;
        return true;
      });

      if (state.typingNudge.timeLeft <= 0) {
        finishTypingRound();
        return;
      }

      renderTypingModule();
    }

    function submitTypingWord() {
      const typed = state.typingNudge.inputValue.trim().toLowerCase();
      if (!typed) return;
      const sorted = [...state.typingNudge.activeWords].sort((a, b) => b.y - a.y);
      const target = sorted.find((word) => word.text === typed);
      if (target) {
        state.typingNudge.activeWords = state.typingNudge.activeWords.filter((word) => word.id !== target.id);
        state.typingNudge.score += 10;
        state.typingNudge.typedWords += 1;
      }
      state.typingNudge.inputValue = '';
      renderTypingModule();
    }

    function startTypingRound() {
      resetTypingNudgeState();
      state.typingNudge.started = true;
      spawnTypingWord();
      trackTypingEvent('started');
      state.typingTimer = setInterval(tickTypingGame, 125);
      renderTypingModule();
    }

    function renderTypingModule() {
      if (!state.moduleShownKey) {
        resetTypingNudgeState();
        state.moduleShownKey = `typing-${state.moduleTicker}`;
        trackTypingEvent('shown');
      }

      const reasonText = typingReasonText();
      const accuracy = typingAccuracy();
      const progress = typingProgressPercent();
      setCardMode(true);
      card.innerHTML = `
        <div class="mb-2 flex items-center justify-between">
          <span class="rounded-full border border-violet-200/50 bg-violet-300/15 px-2 py-0.5 text-xs font-semibold uppercase tracking-wide text-violet-100">Nudge</span>
          <span class="nudge-pulse text-xs font-medium text-violet-200">Pause scroll — try this</span>
        </div>
        <h2 class="text-lg font-semibold">Typing Sprint</h2>
        <p class="mt-1 text-xs text-violet-200/90">Why this appeared: ${reasonText}</p>

        <div class="mt-3 h-2 w-full overflow-hidden rounded-full bg-slate-800/80">
          <div class="h-full rounded-full bg-sky-400 transition-all" style="width: ${progress}%"></div>
        </div>
        <div class="mt-2 flex items-center justify-between text-xs text-slate-200">
          <p>Time left: ${formatSeconds(state.typingNudge.timeLeft)}</p>
          <p>Score: <span class="font-semibold text-sky-300">${state.typingNudge.score}</span></p>
          <p>Accuracy: <span class="font-semibold text-emerald-300">${accuracy}%</span></p>
        </div>

        ${state.typingNudge.finished ? `
          <div class="mt-3 rounded-xl border border-emerald-200/20 bg-emerald-900/20 p-4 text-center">
            <p class="text-lg font-semibold text-emerald-100">Nice sprint.</p>
            <p class="mt-2 text-sm text-slate-200">Final score: ${state.typingNudge.score}</p>
            <p class="text-sm text-slate-200">Accuracy: ${accuracy}% • Misses: ${state.typingNudge.misses}</p>
          </div>
          <div class="mt-4 flex flex-wrap gap-2">
            <button id="retryTypingBtn" class="rounded bg-sky-500 px-4 py-2 text-sm font-semibold">Retry</button>
            <button id="continueTypingBtn" class="rounded bg-emerald-500 px-4 py-2 text-sm font-semibold">Continue feed</button>
          </div>
        ` : `
          <div class="mt-3 rounded-xl border border-sky-200/20 bg-sky-950/25 p-3">
            <div class="relative h-52 overflow-hidden rounded-lg border border-white/10 bg-slate-950/80">
              ${state.typingNudge.activeWords.map((word) => (`
                <span class="absolute rounded-md bg-sky-500/20 px-2 py-1 text-sm font-semibold text-sky-100" style="top:${word.y}%;left:${word.x}%">${word.text}</span>
              `)).join('')}
              ${!state.typingNudge.started ? '<p class="absolute inset-x-0 top-1/2 -translate-y-1/2 text-center text-sm text-slate-300">Tap start, then type falling words before they drop.</p>' : ''}
            </div>

            <label class="mt-3 block text-sm text-slate-200">Type words</label>
            <input id="typingInput" class="mt-1 w-full rounded-lg border border-white/10 bg-slate-950 px-3 py-2 text-sm" autocomplete="off" spellcheck="false" value="${state.typingNudge.inputValue}" placeholder="Type and press space/enter" />
            <p class="mt-1 text-xs text-slate-400">Press space or enter to submit. Matching words score points.</p>
          </div>

          <div class="mt-4 flex flex-wrap gap-2">
            ${!state.typingNudge.started ? '<button id="startTypingBtn" class="rounded bg-sky-500 px-4 py-2 text-sm font-semibold">Start</button>' : ''}
            <button id="skipModuleBtn" class="rounded bg-slate-700 px-4 py-2 text-sm">Skip</button>
            <button id="snoozeModuleBtn" class="rounded border border-violet-300/40 bg-violet-400/10 px-4 py-2 text-sm text-violet-200">Snooze nudges</button>
          </div>
        `}
      `;
      const input = document.getElementById('typingInput');

      const startTypingBtn = document.getElementById('startTypingBtn');
      if (startTypingBtn) startTypingBtn.addEventListener('click', startTypingRound);

      const retryTypingBtn = document.getElementById('retryTypingBtn');
      if (retryTypingBtn) retryTypingBtn.addEventListener('click', startTypingRound);

      const continueTypingBtn = document.getElementById('continueTypingBtn');
      if (continueTypingBtn) {
        continueTypingBtn.addEventListener('click', () => {
          state.moduleShownKey = '';
          state.showingModule = false;
          render();
        });
      }

      const skipButton = document.getElementById('skipModuleBtn');
      if (skipButton) {
        skipButton.addEventListener('click', () => {
          trackTypingEvent('skipped', {
            score: state.typingNudge.score,
            accuracy: typingAccuracy(),
            misses: state.typingNudge.misses,
          });
          resetTypingNudgeState();
          state.moduleShownKey = '';
          state.showingModule = false;
          render();
        });
      }

      const snoozeTypingBtn = document.getElementById('snoozeModuleBtn');
      if (snoozeTypingBtn) {
        snoozeTypingBtn.addEventListener('click', () => {
          state.snoozeRemaining = 10;
          resetTypingNudgeState();
          state.moduleShownKey = '';
          state.showingModule = false;
          updateSnoozeUI();
          render();
        });
      }

      if (input) {
        if (state.typingNudge.started) input.focus();
        input.addEventListener('input', () => {
          state.typingNudge.inputValue = input.value;
          const normalized = state.typingNudge.inputValue.trim().toLowerCase();
          if (normalized && state.typingNudge.activeWords.some((word) => word.text === normalized)) {
            submitTypingWord();
          }
        });
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            submitTypingWord();
          }
        });
      }
    }

    function renderModule() {
      const completedGroups = Math.max(0, Math.floor((state.moduleTicker - 1) / MODULE_EVERY));
      const type = moduleTypeForIndex(completedGroups);
      if (type === 'chess') {
        renderChessModule();
      } else if (type === 'workout') {
        renderWorkoutModule();
      } else {
        renderTypingModule();
      }
    }

    function render() {
      updateSnoozeUI();
      prevBtn.disabled = !state.videos.length;
      nextBtn.disabled = !state.videos.length;
      likeBtn.disabled = !state.videos.length || state.showingModule;

      if (!state.videos.length) {
        card.innerHTML = '<p class="text-slate-300">Upload an MP4 to begin.</p>';
        renderMeta();
        return;
      }

      if (state.showingModule) {
        renderModule();
      } else {
        showVideo(currentVideo());
      }

      renderMeta();
    }

    function step(direction) {
      if (!state.videos.length) return;

      if (state.showingModule) {
        clearWorkoutTimer();
        clearTypingTimer();
        state.moduleShownKey = '';
        state.showingModule = false;
      } else {
        state.cursor = (state.cursor + direction + state.videos.length) % state.videos.length;
        if (direction > 0) {
          state.moduleTicker += 1;
          if (state.snoozeRemaining > 0) {
            state.snoozeRemaining -= 1;
          }
          if (state.snoozeRemaining === 0 && state.moduleTicker % MODULE_EVERY === 0) {
            state.showingModule = true;
          }
        }
      }

      render();
    }

    prevBtn.addEventListener('click', () => step(-1));
    nextBtn.addEventListener('click', () => step(1));
    likeBtn.addEventListener('click', likeCurrent);
    snoozeBtn.addEventListener('click', () => {
      state.snoozeRemaining = 10;
      clearWorkoutTimer();
      clearTypingTimer();
      state.showingModule = false;
      state.moduleShownKey = '';
      updateSnoozeUI();
      render();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowDown') step(1);
      if (event.key === 'ArrowUp') step(-1);
    });

    loadVideos().catch((error) => {
      status.textContent = `Failed to load videos: ${error.message}`;
    });
  </script>
</body>
</html>
