<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nudge Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-10 sm:px-6">
    <section class="w-full rounded-2xl border border-white/10 bg-slate-900/80 p-6 shadow-2xl shadow-violet-950/30 backdrop-blur sm:p-8">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-violet-300">Nudge Studio</p>
          <h1 class="mt-2 text-2xl font-bold sm:text-3xl">Upload an MP4</h1>
          <p class="mt-2 text-sm text-slate-300">Add a new video to the feed. Only <span class="font-semibold text-white">.mp4</span> files up to <span class="font-semibold text-white">50MB</span> are supported.</p>
        </div>
        <a href="/feed" class="rounded-lg border border-white/15 bg-slate-800 px-4 py-2 text-sm font-medium text-violet-200 transition hover:border-violet-300 hover:text-violet-100">Back to feed</a>
      </div>

      <form id="form" class="mt-8 grid gap-5">
        <label class="grid gap-2">
          <span class="text-sm font-medium text-slate-200">Video title</span>
          <input required name="title" placeholder="Morning mobility routine" class="rounded-lg border border-white/15 bg-slate-950/80 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-500/40" />
        </label>

        <label class="grid gap-2">
          <span class="text-sm font-medium text-slate-200">Topic</span>
          <select name="topic" required class="rounded-lg border border-white/15 bg-slate-950/80 px-3 py-2 text-sm text-slate-100 outline-none transition focus:border-violet-400 focus:ring-2 focus:ring-violet-500/40">
            <option value="fitness">fitness</option>
            <option value="chess">chess</option>
            <option value="mindset">mindset</option>
            <option value="productivity">productivity</option>
          </select>
        </label>

        <label class="grid gap-2">
          <span class="text-sm font-medium text-slate-200">Video file</span>
          <input required type="file" name="video" accept="video/mp4" class="block w-full cursor-pointer rounded-lg border border-dashed border-white/20 bg-slate-950/70 px-3 py-3 text-sm text-slate-200 file:mr-4 file:cursor-pointer file:rounded-md file:border-0 file:bg-violet-500 file:px-3 file:py-2 file:text-sm file:font-semibold file:text-white hover:file:bg-violet-400" />
        </label>

        <button type="submit" class="mt-2 inline-flex items-center justify-center rounded-lg bg-violet-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-violet-400">Upload video</button>
      </form>

      <p id="status" class="mt-4 text-sm text-violet-200" role="status"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const file = fd.get('video');
      if (!file || file.type !== 'video/mp4') {
        status.textContent = 'Only MP4 files are allowed.';
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        status.textContent = 'File too large (max 50MB).';
        return;
      }

      status.textContent = 'Uploading...';
      const bytes = new Uint8Array(await file.arrayBuffer());
      let binary = '';
      bytes.forEach((b) => {
        binary += String.fromCharCode(b);
      });
      const contentBase64 = btoa(binary);
      const resp = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          title: fd.get('title'),
          topic: fd.get('topic'),
          filename: file.name,
          mimeType: file.type,
          contentBase64,
        }),
      });
      const json = await resp.json();
      if (!resp.ok) {
        status.textContent = json.error || 'Upload failed';
        return;
      }
      status.textContent = 'Upload successful. Redirecting to feed...';
      setTimeout(() => {
        window.location.href = '/feed';
      }, 900);
    });
  </script>
</body>
</html>
