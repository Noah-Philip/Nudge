<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nudge Landing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .feed-displacement {
      filter: url(#feed-displacement-filter);
    }

    .high-contrast-freeze {
      backdrop-filter: contrast(180%) grayscale(40%);
      background: rgba(255, 255, 255, 0.12);
    }

    .scanline-flash {
      background-image: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.35) 0px,
        rgba(255, 255, 255, 0.35) 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      mix-blend-mode: screen;
      opacity: 0.75;
    }

    .glass-sheen {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.02) 42%, rgba(255, 255, 255, 0.12));
      backdrop-filter: blur(1.5px);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100">
  <svg width="0" height="0" class="absolute">
    <filter id="feed-displacement-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="1" seed="11" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="36" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <div id="root"></div>

  <script type="text/babel" data-presets="typescript,react">
    const { useEffect, useMemo, useRef, useState } = React;
    const { motion, AnimatePresence, useReducedMotion } = Motion;

    const POSTS = [
      { id: 1, caption: '3 breath reset between meetings', author: '@nudge', likes: '12.4k', comments: '611', gradient: 'from-violet-600 to-indigo-900' },
      { id: 2, caption: 'Small wins > big plans', author: '@coach', likes: '9.1k', comments: '488', src: '/uploads/demo-clip-2.mp4' },
      { id: 3, caption: 'Posture check + 20 sec stretch', author: '@fitloop', likes: '7.7k', comments: '245', gradient: 'from-emerald-500 to-cyan-900' },
      { id: 4, caption: 'One move puzzle, can you spot it?', author: '@chessflow', likes: '15.2k', comments: '1.1k', src: '/uploads/demo-clip-4.mp4' },
      { id: 5, caption: 'Just one more scroll...', author: '@nudge', likes: '22.0k', comments: '1.9k', gradient: 'from-rose-500 to-orange-900' },
    ];

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function IconColumn({ likes, comments }) {
      return (
        <div className="absolute right-3 bottom-6 flex flex-col items-center gap-4 text-xs">
          <button className="rounded-full bg-black/45 p-2" aria-label="Like post">❤️</button>
          <span>{likes}</span>
          <button className="rounded-full bg-black/45 p-2" aria-label="Comment on post">💬</button>
          <span>{comments}</span>
          <button className="rounded-full bg-black/45 p-2" aria-label="Share post">↗️</button>
        </div>
      );
    }

    function App() {
      const reduceMotion = useReducedMotion();
      const [index, setIndex] = useState(0);
      const [overlayVisible, setOverlayVisible] = useState(false);
      const [showShatterLayer, setShowShatterLayer] = useState(false);
      const [isUnzipping, setIsUnzipping] = useState(false);
      const [unlocked, setUnlocked] = useState(false);
      const [loopCount, setLoopCount] = useState(1);
      const [swipeStartY, setSwipeStartY] = useState(null);
      const [frameTearActive, setFrameTearActive] = useState(false);
      const [sliceOffsets, setSliceOffsets] = useState(Array(8).fill(0));
      const [rgbSplitActive, setRgbSplitActive] = useState(false);
      const [displacementActive, setDisplacementActive] = useState(false);
      const [freezeOverlay, setFreezeOverlay] = useState(false);
      const [scanlineFlash, setScanlineFlash] = useState(false);
      const [shakeTransform, setShakeTransform] = useState('translate3d(0,0,0) rotate(0deg)');
      const [buttonPulse, setButtonPulse] = useState(false);
      const [fractureCenter, setFractureCenter] = useState(null);

      const lockRef = useRef(false);
      const glitchRunningRef = useRef(false);
      const feedRef = useRef(null);
      const shatterCanvasRef = useRef(null);
      const rafRef = useRef(0);
      const lastSwipeRef = useRef(null);

      const currentPost = POSTS[index];
      const progressText = `${index + 1} / ${POSTS.length}`;
      const lowEndDevice = (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4)
        || (navigator.deviceMemory && navigator.deviceMemory <= 4)
        || (window.matchMedia('(max-width: 768px)').matches && navigator.maxTouchPoints > 0);

      useEffect(() => {
        const raw = Number(localStorage.getItem('nudge-loop-counter') || '0');
        setLoopCount(Number.isFinite(raw) && raw > 0 ? raw : 1);
      }, []);

      useEffect(() => {
        document.body.style.overflow = unlocked ? 'auto' : 'hidden';
        return () => {
          document.body.style.overflow = 'auto';
          cancelAnimationFrame(rafRef.current);
        };
      }, [unlocked]);

      useEffect(() => {
        const video = feedRef.current?.querySelector('video');
        if (!video) return;
        if (showShatterLayer || freezeOverlay || overlayVisible) {
          video.pause();
        } else {
          video.play().catch(() => undefined);
        }
      }, [showShatterLayer, freezeOverlay, overlayVisible, index]);

      const pulseButton = () => {
        setButtonPulse(true);
        setTimeout(() => setButtonPulse(false), 220);
      };

      const buildSnapshotCanvas = (rect, center) => {
        const off = document.createElement('canvas');
        off.width = Math.max(1, Math.floor(rect.width));
        off.height = Math.max(1, Math.floor(rect.height));
        const ctx = off.getContext('2d');
        if (!ctx) return null;

        try {
          const video = feedRef.current?.querySelector('video');
          if (video && video.readyState >= 2) {
            ctx.drawImage(video, 0, 0, off.width, off.height);
          } else {
            const gradient = ctx.createLinearGradient(0, 0, off.width, off.height);
            gradient.addColorStop(0, '#7c3aed');
            gradient.addColorStop(1, '#0f172a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, off.width, off.height);
          }

          const dim = ctx.createLinearGradient(0, 0, 0, off.height);
          dim.addColorStop(0, 'rgba(0,0,0,0.08)');
          dim.addColorStop(1, 'rgba(0,0,0,0.62)');
          ctx.fillStyle = dim;
          ctx.fillRect(0, 0, off.width, off.height);

          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.font = '600 16px system-ui, sans-serif';
          ctx.fillText(currentPost.author, 18, off.height - 48);
          ctx.font = '700 20px system-ui, sans-serif';
          ctx.fillText(currentPost.caption.slice(0, 34), 18, off.height - 22);

          const shine = ctx.createRadialGradient(center.x, center.y, 12, center.x, center.y, rect.width * 0.7);
          shine.addColorStop(0, 'rgba(255,255,255,0.26)');
          shine.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = shine;
          ctx.fillRect(0, 0, off.width, off.height);

          return off;
        } catch (_) {
          return null;
        }
      };

      const buildShardTriangles = (width, height, center, reduced) => {
        const count = reduced ? 16 : Math.floor(70 + Math.random() * 40);
        const shards = [];
        const cx = center.x;
        const cy = center.y;
        for (let i = 0; i < count; i += 1) {
          const a0 = (i / count) * Math.PI * 2;
          const a1 = ((i + 1) / count) * Math.PI * 2;
          const r0 = Math.max(width, height) * (0.35 + Math.random() * 0.75);
          const r1 = Math.max(width, height) * (0.35 + Math.random() * 0.75);
          const p0 = [clamp(cx + Math.cos(a0) * r0, 0, width), clamp(cy + Math.sin(a0) * r0, 0, height)];
          const p1 = [clamp(cx + Math.cos(a1) * r1, 0, width), clamp(cy + Math.sin(a1) * r1, 0, height)];
          const p2 = [clamp(cx + (Math.random() - 0.5) * 26, 0, width), clamp(cy + (Math.random() - 0.5) * 26, 0, height)];
          shards.push({ points: [p0, p1, p2] });
        }
        return shards.slice(0, 90);
      };

      const runShatterAnimation = async () => {
        const canvas = shatterCanvasRef.current;
        const feedRect = feedRef.current?.getBoundingClientRect();
        if (!canvas || !feedRect) return;

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const dpr = window.devicePixelRatio || 1;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        canvas.width = Math.floor(viewportWidth * dpr);
        canvas.height = Math.floor(viewportHeight * dpr);
        canvas.style.width = `${viewportWidth}px`;
        canvas.style.height = `${viewportHeight}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const localFallbackCenter = { x: feedRect.width / 2, y: feedRect.height / 2 };
        const localCenter = lastSwipeRef.current
          ? {
            x: clamp(lastSwipeRef.current.x - feedRect.left, 0, feedRect.width),
            y: clamp(lastSwipeRef.current.y - feedRect.top, 0, feedRect.height),
          }
          : localFallbackCenter;
        const center = {
          x: feedRect.left + localCenter.x,
          y: feedRect.top + localCenter.y,
        };
        setFractureCenter(center);

        const fracturePointCount = Math.floor(8 + Math.random() * 7);
        const fracturePoints = Array.from({ length: fracturePointCount }, () => ({
          x: localCenter.x + (Math.random() - 0.5) * 48,
          y: localCenter.y + (Math.random() - 0.5) * 48,
        }));

        const snapshot = buildSnapshotCanvas(feedRect, localCenter);
        const reduced = reduceMotion || lowEndDevice;
        const baseShards = buildShardTriangles(feedRect.width, feedRect.height, localCenter, reduced);

        const shards = baseShards.map((shard) => {
          const points = shard.points.map((point) => [point[0] + feedRect.left, point[1] + feedRect.top]);
          const centroid = points.reduce((acc, point) => ({ x: acc.x + point[0], y: acc.y + point[1] }), { x: 0, y: 0 });
          centroid.x /= shard.points.length;
          centroid.y /= shard.points.length;
          const angle = Math.atan2(centroid.y - center.y, centroid.x - center.x);
          const speed = reduced ? 220 + Math.random() * 180 : 560 + Math.random() * 880;
          const edgeBoost = reduced ? 90 : 260;
          return {
            points,
            x: 0,
            y: 0,
            angle: 0,
            alpha: 1,
            spin: reduced ? 0 : (Math.random() - 0.5) * 7,
            vx: Math.cos(angle) * speed + (Math.cos(angle) * edgeBoost),
            vy: Math.sin(angle) * speed + (Math.sin(angle) * edgeBoost),
            fractureBias: (() => {
              const bias = fracturePoints[Math.floor(Math.random() * fracturePoints.length)];
              return { x: bias.x + feedRect.left, y: bias.y + feedRect.top };
            })(),
          };
        });

        const gravity = reduced ? 0 : 220;
        const start = performance.now();
        let previous = start;

        const drawShard = (shard, blurPass) => {
          ctx.save();
          ctx.translate(shard.x, shard.y);
          ctx.rotate(shard.angle);

          ctx.beginPath();
          const [first, ...rest] = shard.points;
          ctx.moveTo(first[0], first[1]);
          rest.forEach((point) => ctx.lineTo(point[0], point[1]));
          ctx.closePath();
          ctx.clip();

          if (snapshot) {
            ctx.drawImage(snapshot, feedRect.left, feedRect.top, feedRect.width, feedRect.height);
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.28)';
            ctx.fill();
          }

          ctx.globalAlpha = blurPass ? shard.alpha * 0.24 : shard.alpha;
          ctx.strokeStyle = 'rgba(255,255,255,0.22)';
          ctx.lineWidth = 0.9;
          ctx.stroke();
          ctx.restore();
        };

        const tick = (now) => {
          const elapsed = now - start;
          const dt = Math.min(0.032, (now - previous) / 1000 || 0.016);
          previous = now;
          const fade = clamp((elapsed - 840) / 320, 0, 1);

          ctx.clearRect(0, 0, viewportWidth, viewportHeight);
          shards.forEach((shard) => {
            const dx = shard.fractureBias.x - center.x;
            const dy = shard.fractureBias.y - center.y;
            const wave = elapsed < 120 ? (1 - elapsed / 120) * 350 : 0;
            if (!reduced && wave > 0) {
              const dist = Math.max(8, Math.hypot(dx, dy));
              shard.vx += (dx / dist) * wave * dt;
              shard.vy += (dy / dist) * wave * dt;
            }

            shard.vx *= reduced ? 0.94 : 0.985;
            shard.vy = shard.vy * (reduced ? 0.92 : 0.984) + gravity * dt;
            shard.x += shard.vx * dt;
            shard.y += shard.vy * dt;
            shard.angle += shard.spin * dt;
            shard.alpha = 1 - fade;

            if (!reduced && Math.abs(shard.vx) + Math.abs(shard.vy) > 380) {
              ctx.save();
              ctx.globalAlpha = 0.14 * shard.alpha;
              ctx.filter = 'blur(1px)';
              drawShard(shard, true);
              ctx.restore();
            }
            drawShard(shard, false);
          });

          if (elapsed < 1280) {
            rafRef.current = requestAnimationFrame(tick);
          } else {
            ctx.clearRect(0, 0, viewportWidth, viewportHeight);
            setShowShatterLayer(false);
            setFreezeOverlay(false);
          }
        };

        cancelAnimationFrame(rafRef.current);
        rafRef.current = requestAnimationFrame(tick);
      };

      const runGlitchAndShatter = async () => {
        if (glitchRunningRef.current) return;
        glitchRunningRef.current = true;

        setShowShatterLayer(true);
        setFreezeOverlay(true);
        setScanlineFlash(true);
        setFrameTearActive(true);

        if (!reduceMotion) {
          for (let frame = 0; frame < 4; frame += 1) {
            setSliceOffsets(Array.from({ length: 8 }, () => Math.round((Math.random() * 120) - 60)));
            await sleep(90);
          }
          setRgbSplitActive(true);
          setDisplacementActive(true);
          const start = performance.now();
          await new Promise((resolve) => {
            const shake = (now) => {
              const t = clamp((now - start) / 380, 0, 1);
              const amp = (1 - t) * 8;
              setShakeTransform(`translate3d(${(Math.random() * 2 - 1) * amp}px, ${(Math.random() * 2 - 1) * amp * 0.6}px, 0) rotate(${(Math.random() * 2 - 1) * amp * 0.12}deg)`);
              if (t < 1) {
                requestAnimationFrame(shake);
              } else {
                setShakeTransform('translate3d(0,0,0) rotate(0deg)');
                resolve();
              }
            };
            requestAnimationFrame(shake);
          });
        } else {
          await sleep(220);
        }

        setFrameTearActive(false);
        setRgbSplitActive(false);
        setDisplacementActive(false);
        setScanlineFlash(false);

        await runShatterAnimation();
        await sleep(reduceMotion ? 340 : 200);

        setOverlayVisible(true);
        setLoopCount((current) => {
          const next = current + 1;
          localStorage.setItem('nudge-loop-counter', String(next));
          return next;
        });
        pulseButton();
        glitchRunningRef.current = false;
      };

      const maybeAdvance = (delta) => {
        if (unlocked || overlayVisible || showShatterLayer || lockRef.current) return;
        if (Math.abs(delta) < 12) return;

        lockRef.current = true;
        setTimeout(() => { lockRef.current = false; }, 240);

        if (delta > 0) {
          setIndex((current) => Math.min(current + 1, POSTS.length - 1));
        } else {
          setIndex((current) => Math.max(0, current - 1));
        }
      };

      useEffect(() => {
        if (index !== POSTS.length - 1 || overlayVisible || unlocked || glitchRunningRef.current) return;
        runGlitchAndShatter();
      }, [index, overlayVisible, unlocked]);

      useEffect(() => {
        const onWheel = (event) => {
          if (unlocked) return;
          event.preventDefault();
          lastSwipeRef.current = { x: event.clientX || window.innerWidth / 2, y: event.clientY || window.innerHeight / 2 };
          maybeAdvance(event.deltaY);
        };

        window.addEventListener('wheel', onWheel, { passive: false });
        return () => window.removeEventListener('wheel', onWheel);
      }, [unlocked, overlayVisible, showShatterLayer]);

      const onTouchStart = (event) => {
        if (unlocked) return;
        const touch = event.touches[0];
        setSwipeStartY(touch.clientY);
        lastSwipeRef.current = { x: touch.clientX, y: touch.clientY };
      };

      const onTouchMove = (event) => {
        if (unlocked || swipeStartY === null) return;
        const touch = event.touches[0];
        const delta = swipeStartY - touch.clientY;
        if (Math.abs(delta) > 25) {
          event.preventDefault();
          lastSwipeRef.current = { x: touch.clientX, y: touch.clientY };
          maybeAdvance(delta);
          setSwipeStartY(touch.clientY);
        }
      };

      const onTouchEnd = () => setSwipeStartY(null);

      const feedLayer = useMemo(() => (
        <>
          {currentPost.src ? (
            <video src={currentPost.src} muted autoPlay={!showShatterLayer && !overlayVisible} loop playsInline className="h-full w-full object-cover" />
          ) : (
            <div className={`h-full w-full bg-gradient-to-b ${currentPost.gradient}`}></div>
          )}

          <div className="absolute inset-0 bg-gradient-to-t from-black/75 via-transparent to-black/10"></div>
          <div className="absolute left-4 bottom-6 right-20">
            <p className="text-sm text-violet-300">{currentPost.author}</p>
            <h2 className="mt-2 text-lg font-semibold leading-tight">{currentPost.caption}</h2>
          </div>
          <IconColumn likes={currentPost.likes} comments={currentPost.comments} />
        </>
      ), [currentPost, showShatterLayer, overlayVisible]);

      const showMiniFeed = !unlocked;

      return (
        <>
          <div
            aria-hidden="true"
            className="pointer-events-none fixed inset-0 z-0 flex items-center justify-center overflow-hidden select-none"
          >
            <span
              className="text-[clamp(8rem,42vw,24rem)] font-black uppercase tracking-[0.26em] text-violet-300/15 scale-y-125"
              style={{ fontFamily: 'Helvetica, Arial, sans-serif' }}
            >
              NUDGE
            </span>
          </div>

          <main className="relative z-10 mx-auto min-h-screen max-w-md p-4">
          {showMiniFeed ? (
            <div className="relative mt-8 h-[76vh] max-h-[740px] w-full" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
              <AnimatePresence mode="wait">
                <motion.div
                  key={currentPost.id}
                  initial={{ opacity: 0.3, y: reduceMotion ? 0 : 20 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0.2, y: reduceMotion ? 0 : -20 }}
                  transition={{ duration: reduceMotion ? 0 : 0.28 }}
                  className="relative h-full w-full overflow-hidden rounded-2xl border border-white/15 bg-slate-900"
                  style={{ transform: shakeTransform }}
                  ref={feedRef}
                >
                  <div className={`absolute inset-0 ${displacementActive ? 'feed-displacement' : ''}`}>{feedLayer}</div>

                  {rgbSplitActive && (
                    <>
                      <div className="absolute inset-0 mix-blend-screen opacity-70" style={{ transform: 'translateX(-6px)', filter: 'hue-rotate(335deg)' }}>{feedLayer}</div>
                      <div className="absolute inset-0 mix-blend-screen opacity-70" style={{ transform: 'translateX(6px)', filter: 'hue-rotate(180deg)' }}>{feedLayer}</div>
                    </>
                  )}

                  {frameTearActive && Array.from({ length: 8 }).map((_, sliceIndex) => {
                    const top = sliceIndex * 12.5;
                    return (
                      <div key={`slice-${sliceIndex}`} className="absolute left-0 w-full overflow-hidden" style={{ top: `${top}%`, height: '12.5%' }}>
                        <div className="absolute left-0 h-full w-full" style={{ transform: `translateX(${sliceOffsets[sliceIndex]}px) translateY(-${top}%)`, height: '800%' }}>{feedLayer}</div>
                      </div>
                    );
                  })}

                  {freezeOverlay && <div className="high-contrast-freeze absolute inset-0"></div>}
                  {scanlineFlash && <div className="scanline-flash absolute inset-0"></div>}
                </motion.div>
              </AnimatePresence>

              <p className="absolute left-3 top-3 rounded bg-black/45 px-2 py-1 text-xs">{progressText}</p>

              <AnimatePresence>
                {showShatterLayer && (
                  <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="pointer-events-none fixed inset-0 z-30"
                    aria-hidden="true"
                  >
                    <canvas ref={shatterCanvasRef} className="absolute inset-0 h-full w-full" />
                    <div className="glass-sheen absolute inset-0"></div>
                    {fractureCenter && <div className="absolute h-4 w-4 -translate-x-1/2 -translate-y-1/2 rounded-full bg-white/30 blur-sm" style={{ left: fractureCenter.x, top: fractureCenter.y }}></div>}
                  </motion.div>
                )}
              </AnimatePresence>

              <AnimatePresence>
                {overlayVisible && (
                  <motion.div
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-slate-950/90 px-8 text-center"
                    role="dialog"
                    aria-modal="true"
                    aria-label="Break the loop dialog"
                  >
                    <h2 className="text-3xl font-bold">You just did it again.</h2>
                    <p className="mt-3 text-slate-300">Loop count: <span className="font-semibold text-white">{loopCount}</span></p>
                    <button
                      className="mt-6 rounded-lg bg-violet-500 px-5 py-3 font-semibold text-white hover:bg-violet-400"
                      style={{ transform: buttonPulse ? 'scale(1.06)' : 'scale(1)', transition: 'transform 120ms ease-out' }}
                      onClick={() => { window.location.href = '/feed'; }}
                    >
                      Break the loop
                    </button>
                  </motion.div>
                )}
              </AnimatePresence>

              <AnimatePresence>
                {isUnzipping && !reduceMotion && (
                  <>
                    <motion.div
                      initial={{ x: 0 }}
                      animate={{ x: '-105%' }}
                      transition={{ duration: 0.75, ease: 'easeInOut' }}
                      onAnimationComplete={() => {
                        setUnlocked(true);
                        setOverlayVisible(false);
                        setIsUnzipping(false);
                      }}
                      className="absolute left-0 top-0 z-50 h-full w-1/2 bg-slate-900"
                    />
                    <motion.div
                      initial={{ x: 0 }}
                      animate={{ x: '105%' }}
                      transition={{ duration: 0.75, ease: 'easeInOut' }}
                      className="absolute right-0 top-0 z-50 h-full w-1/2 bg-slate-900"
                    />
                  </>
                )}
              </AnimatePresence>

            </div>
          ) : (
            <section className="mx-auto mt-10 rounded-2xl border border-white/10 bg-slate-900/60 p-6">
              <p className="text-xs uppercase tracking-[0.2em] text-violet-300">Real landing content</p>
              <h1 className="mt-3 text-3xl font-bold">Break scroll loops with deterministic nudges.</h1>
              <p className="mt-3 text-slate-300">Nudge inserts lightweight interactive moments that turn passive swiping into intentional action. Built for local demos with predictable behavior and no external services.</p>
              <div className="mt-6 flex gap-3">
                <a href="/feed" className="rounded-lg bg-violet-500 px-4 py-2 font-semibold hover:bg-violet-400">Open full feed</a>
