<!doctype html><html><head><meta charset="utf-8"/><title>Nudge Library</title></head><body style="font-family:Arial;max-width:900px;margin:30px auto"><h1>Library</h1><a href="/">Back</a><ul id="list"></ul><script>
async function load(){const r=await fetch('/api/videos');const j=await r.json();document.getElementById('list').innerHTML=(j.videos||[]).map(v=>`<li style='margin:8px 0'>${v.title} (${v.topic}) <button onclick="del('${v.id}')">Delete</button></li>`).join('');}
async function del(id){await fetch('/api/videos/'+id,{method:'DELETE'});load();}
load();
</script></body></html>
